[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[redirects]]
  from = "/embed/armado/*"
  to = "https://mario-mojica-armado.netlify.app/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/assets/*"
  to = "https://mario-mojica-armado.netlify.app/assets/:splat"
  status = 200

[[redirects]]
  from = "/manual-vacio/*"
  to = "https://mario-mojica-armado.netlify.app/manual-vacio/:splat"
  status = 200

[[redirects]]
  from = "/M*"
  to = "https://mario-mojica-armado.netlify.app/M:splat"
  status = 200

