<svg width="842" height="595" viewBox="0 0 842 595" xmlns="http://www.w3.org/2000/svg">
  <!-- Annual Report Red/Black Layout -->
  <!-- Designed by Antigravity - Editable Template -->
  
  <rect width="842" height="595" fill="#f8f8f8" />
  
  <!-- Content Group -->
  <g id="layout_content">
    <!-- Left Page -->
    <g id="left_page">
      <rect x="0" y="0" width="421" height="595" fill="#ffffff" />
      
      <!-- Header Accent -->
      <rect id="accent_top" x="40" y="40" width="120" height="20" fill="#e31e24" />
      
      <!-- Main Image Placeholder -->
      <rect id="image_main" x="40" y="80" width="341" height="250" fill="#2c2c2c" rx="2" />
      <text x="210" y="210" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">IMAGE PLACEHOLDER</text>
      
      <!-- Title -->
      <text id="title" x="40" y="380" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#1a1a1a">ANNUAL</text>
      <text id="subtitle" x="40" y="420" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#e31e24">REPORT</text>
      <text id="design_label" x="40" y="450" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a1a">DESIGN</text>
      
      <!-- Footer Text -->
      <text x="40" y="540" font-family="Arial, sans-serif" font-size="10" fill="#666666">Copyright © 2026. All rights reserved.</text>
      <text x="380" y="540" font-family="Arial, sans-serif" font-size="10" fill="#666666" text-anchor="end">Page 01</text>
    </g>
    
    <!-- Right Page -->
    <g id="right_page" transform="translate(421, 0)">
      <rect x="0" y="0" width="421" height="595" fill="#ffffff" />
      
      <!-- Vertical Accent Bar -->
      <rect id="accent_side" x="0" y="0" width="10" height="595" fill="#1a1a1a" />
      
      <!-- Content Section 1 -->
      <rect id="section_1_header" x="40" y="40" width="341" height="40" fill="#f0edee" />
      <text x="50" y="65" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a1a">FINANCIAL OVERVIEW</text>
      
      <!-- Table Placeholder -->
      <g id="table">
        <line x1="40" y1="100" x2="381" y2="100" stroke="#cccccc" />
        <line x1="40" y1="130" x2="381" y2="130" stroke="#cccccc" />
        <line x1="40" y1="160" x2="381" y2="160" stroke="#cccccc" />
        <line x1="40" y1="190" x2="381" y2="190" stroke="#cccccc" />
      </g>
      
      <!-- Content Section 2 -->
      <g id="section_2">
        <rect id="map_placeholder" x="40" y="230" width="200" height="150" fill="#e31e24" opacity="0.1" />
        <text x="140" y="310" font-family="Arial, sans-serif" font-size="14" fill="#e31e24" text-anchor="middle">GLOBAL REACH</text>
        
        <rect id="text_block" x="250" y="230" width="131" height="150" fill="#2c2c2c" />
        <text x="315" y="310" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">KEY STATS</text>
      </g>
      
      <!-- Charts Area -->
      <g id="charts" transform="translate(40, 420)">
        <circle cx="40" cy="40" r="30" fill="none" stroke="#e31e24" stroke-width="15" stroke-dasharray="140 100" />
        <circle cx="140" cy="40" r="30" fill="none" stroke="#1a1a1a" stroke-width="15" stroke-dasharray="80 120" />
        <circle cx="240" cy="40" r="30" fill="none" stroke="#cccccc" stroke-width="15" stroke-dasharray="180 50" />
      </g>
      
      <text x="380" y="540" font-family="Arial, sans-serif" font-size="10" fill="#666666" text-anchor="end">Page 02</text>
    </g>
  </g>
</svg>
