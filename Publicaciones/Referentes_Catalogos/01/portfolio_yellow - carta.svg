<svg width="1632" height="5280" viewBox="0 0 1632 5280" xmlns="http://www.w3.org/2000/svg">
  <!-- Detailed Yellow Portfolio Template -->
  <!-- Inspired by plantilla-portafolio-color-diseno-plano_23-2149215470.jpg -->
  <!-- Designed by Antigravity - Fully Editable SVG -->
  
  <rect width="1632" height="5280" fill="#f0f0f0" />
  
  <!-- Page 01: Cover (Single Letter Page, centered) -->
  <g id="page_01_cover" transform="translate(408, 0)">
    <rect width="816" height="1056" fill="#ffffff" />
    <rect id="cover_accent" x="50" y="50" width="200" height="400" fill="#ffcc00" />
    <text x="300" y="150" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#1a1a1a">JAMES DON</text>
    <text x="300" y="210" font-family="Arial, sans-serif" font-size="36" fill="#666666">Photographer</text>
    <g transform="translate(300, 320)">
      <text y="0" font-family="Arial, sans-serif" font-size="24" fill="#999999">yourname@company.com</text>
      <text y="40" font-family="Arial, sans-serif" font-size="24" fill="#999999">www.yourportfolio.com</text>
      <text y="80" font-family="Arial, sans-serif" font-size="24" fill="#999999">north street avenue</text>
    </g>
    
    <text x="50" y="600" font-family="Arial, sans-serif" font-size="120" font-weight="extrabold" fill="#1a1a1a">Portfolio</text>
    
    <!-- Hero Image Placeholder -->
    <rect x="50" y="680" width="716" height="300" fill="#eeeeee" />
    <text x="408" y="840" font-family="Arial, sans-serif" font-size="32" fill="#999999" text-anchor="middle">HERO IMAGE</text>
    <rect x="50" y="1000" width="40" height="40" fill="#1a1a1a" />
    <rect x="736" y="960" width="60" height="80" fill="#ffcc00" />
  </g>
  
  <!-- Page 02 & 03: About Me / Table of Contents (Spread 1: 1632x1056) -->
  <g id="spread_01" transform="translate(0, 1056)">
    <!-- Page 02: About -->
    <g id="page_02_about">
      <rect width="816" height="1056" fill="#ffffff" />
      <text x="60" y="100" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#1a1a1a">About</text>
      <text x="60" y="180" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#1a1a1a">Me</text>
      
      <rect x="100" y="250" width="250" height="350" fill="#dddddd" />
      <text x="380" y="320" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#1a1a1a">Hello</text>
      <text x="380" y="380" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#1a1a1a">I'm James</text>
      
      <!-- Social Icons -->
      <g transform="translate(380, 450)">
        <circle cx="15" cy="15" r="15" fill="#1a1a1a" /> <text x="45" y="25" font-family="Arial, sans-serif" font-size="24">facebook</text>
        <circle cx="15" cy="65" r="15" fill="#1a1a1a" /> <text x="45" y="75" font-family="Arial, sans-serif" font-size="24">instagram</text>
        <circle cx="15" cy="115" r="15" fill="#1a1a1a" /> <text x="45" y="125" font-family="Arial, sans-serif" font-size="24">twitter</text>
      </g>
      
      <rect x="60" y="750" width="696" height="150" fill="#ffcc00" />
      <text x="80" y="830" font-family="Arial, sans-serif" font-size="20" fill="#1a1a1a">Lorem ipsum dolor sit amet, consectetuer adipiscing elit.</text>
      <rect x="736" y="50" width="50" height="50" fill="#1a1a1a" />
      <text x="761" y="85" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle">01</text>
    </g>
    
    <!-- Page 03: TOC -->
    <g id="page_03_toc" transform="translate(816, 0)">
      <rect width="816" height="1056" fill="#ffffff" />
      <text x="60" y="100" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#1a1a1a">Table</text>
      <text x="60" y="180" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#1a1a1a">of Content</text>
      
      <rect x="60" y="250" width="696" height="400" fill="#ffcc00" />
      <g transform="translate(100, 320)">
        <text y="0" font-family="Arial, sans-serif" font-size="32" font-weight="bold">Project 01</text>
        <text x="500" y="0" font-family="Arial, sans-serif" font-size="32" text-anchor="end">03</text>
        <rect y="20" width="300" height="2" fill="#1a1a1a" />
        
        <text y="100" font-family="Arial, sans-serif" font-size="32" font-weight="bold">Project 02</text>
        <text x="500" y="100" font-family="Arial, sans-serif" font-size="32" text-anchor="end">05</text>
        
        <text y="200" font-family="Arial, sans-serif" font-size="32" font-weight="bold">Project 03</text>
        <text x="500" y="200" font-family="Arial, sans-serif" font-size="32" text-anchor="end">07</text>
      </g>
      
      <rect x="736" y="50" width="50" height="50" fill="#1a1a1a" />
      <text x="761" y="85" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle">02</text>
    </g>
  </g>
  
  <!-- Spreads 02 & 03: Projects Showcase (Each 1632x1056) -->
  <g id="spread_02" transform="translate(0, 2112)">
    <!-- Page 04: Project Detail -->
