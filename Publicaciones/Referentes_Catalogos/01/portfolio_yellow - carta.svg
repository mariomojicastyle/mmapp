      <rect width="816" height="1056" fill="#ffffff" />
      <rect x="300" y="100" width="450" height="450" fill="#eeeeee" />
      <rect x="250" y="500" width="100" height="100" fill="#ffcc00" />
      
      <g transform="translate(50, 250)">
        <text y="0" font-family="Arial, sans-serif" font-size="24" fill="#999999">TITLE HERE</text>
        <text y="80" font-family="Arial, sans-serif" font-size="48" font-weight="bold">2020</text>
      </g>
      
      <rect x="736" y="50" width="50" height="50" fill="#1a1a1a" />
      <text x="761" y="85" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle">06</text>
    </g>
  </g>
  
  <!-- Final Spread: Project 03 -->
  <g id="spread_04" transform="translate(0, 4224)">
    <g id="page_08_project_03">
      <rect width="816" height="1056" fill="#ffffff" />
      <text x="50" y="100" font-family="Arial, sans-serif" font-size="80" font-weight="extrabold" fill="#1a1a1a">Project</text>
      <text x="350" y="100" font-family="Arial, sans-serif" font-size="80" font-weight="light" fill="#999999">03</text>
      
      <rect x="50" y="200" width="500" height="500" fill="#eeeeee" />
      <rect x="580" y="200" width="200" height="350" fill="#dddddd" />
      <rect x="350" y="750" width="250" height="100" fill="#ffcc00" />
      
      <text x="50" y="850" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffcc00">2020</text>
      
      <rect x="736" y="50" width="50" height="50" fill="#1a1a1a" />
      <text x="761" y="85" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle">07</text>
    </g>
    
    <g id="page_09_last" transform="translate(816, 0)">
      <rect width="816" height="1056" fill="#ffffff" />
      <rect x="0" y="0" width="80" height="80" fill="#ffcc00" />
      <rect x="100" y="100" width="616" height="500" fill="#eeeeee" />
      <rect x="716" y="600" width="100" height="100" fill="#ffcc00" />
      <rect x="680" y="700" width="50" height="50" fill="#ffcc00" opacity="0.5" />
      
      <g transform="translate(100, 700)">
        <text y="0" font-family="Arial, sans-serif" font-size="24" fill="#999999">TITLE HERE</text>
        <text y="80" font-family="Arial, sans-serif" font-size="48" font-weight="bold">2021</text>
      </g>
      
      <rect x="736" y="50" width="50" height="50" fill="#1a1a1a" />
      <text x="761" y="85" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle">08</text>
    </g>
