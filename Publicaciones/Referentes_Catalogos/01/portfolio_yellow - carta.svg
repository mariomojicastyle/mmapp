      <rect width="816" height="1056" fill="#ffffff" />
      <rect x="50" y="50" width="500" height="500" fill="#eeeeee" />
      <rect x="580" y="500" width="200" height="200" fill="#ffcc00" />
      
      <text x="50" y="700" font-family="Arial, sans-serif" font-size="80" font-weight="extrabold" fill="#1a1a1a">Project</text>
      <text x="350" y="700" font-family="Arial, sans-serif" font-size="80" font-weight="light" fill="#999999">02</text>
      <text x="50" y="800" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffcc00">2021</text>
      
      <rect x="736" y="50" width="50" height="50" fill="#1a1a1a" />
      <text x="761" y="85" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle">05</text>
    </g>
    
