      <rect width="816" height="1056" fill="#ffffff" />
      <rect x="0" y="0" width="150" height="50" fill="#ffcc00" />
      
      <rect x="100" y="100" width="500" height="500" fill="#eeeeee" />
      <g transform="translate(620, 200)">
         <text y="0" font-family="Arial, sans-serif" font-size="24" fill="#999999" letter-spacing="4">TITLE HERE</text>
         <text y="80" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffcc00">2019</text>
      </g>
      
      <text x="100" y="750" font-family="Arial, sans-serif" font-size="80" font-weight="extrabold" fill="#1a1a1a">Project</text>
      <text x="400" y="750" font-family="Arial, sans-serif" font-size="80" font-weight="light" fill="#999999">01</text>
      
      <rect x="736" y="50" width="50" height="50" fill="#1a1a1a" stroke="#ffcc00" />
      <text x="761" y="85" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle">03</text>
    </g>
    
    <!-- Page 05: Project Gallery -->
    <g id="page_05_gallery" transform="translate(816, 0)">
      <rect width="816" height="1056" fill="#ffffff" />
      <rect x="100" y="50" width="500" height="500" fill="#eeeeee" />
      <rect x="620" y="550" width="150" height="150" fill="#ffcc00" />
      
      <g transform="translate(100, 700)">
        <text y="0" font-family="Arial, sans-serif" font-size="24" font-weight="bold">TITLE HERE</text>
        <text y="80" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#1a1a1a">2020</text>
      </g>
      
      <rect x="786" y="0" width="30" height="100" fill="#ffcc00" />
      <rect x="736" y="50" width="50" height="50" fill="#1a1a1a" />
      <text x="761" y="85" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle">04</text>
    </g>
  </g>
  
  <!-- Spread 03: Continued Projects -->
  <g id="spread_03" transform="translate(0, 3168)">
    <!-- Page 06: Project 02 -->
