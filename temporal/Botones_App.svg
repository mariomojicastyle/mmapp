<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&amp;display=swap');
      
      .bg-preview { fill: #E8EAEB; } /* Similar to the 3D scene background */
      
      .btn-teal { fill: #0082A3; } /* Color picked from the images */
      .btn-teal-faint { fill: #0082A3; opacity: 0.3; } /* For the glow on step 9 */
      
      .icon-white { 
        fill: none; 
        stroke: #FFFFFF; 
        stroke-width: 3.5; 
        stroke-linecap: round; 
        stroke-linejoin: round; 
      }
      
      .icon-fill-white { fill: #FFFFFF; }
      
      .text-white { 
        fill: #FFFFFF; 
        font-family: 'Inter', sans-serif; 
        font-weight: 800; 
        text-anchor: middle; 
        dominant-baseline: central; 
      }
      
      .text-large { font-size: 32px; font-weight: 900; }
      .text-medium { font-size: 20px; }
      
      /* Dropshadow for buttons */
      .shadow { filter: drop-shadow(0px 8px 12px rgba(0,0,0,0.15)); }
    </style>
  </defs>

  <!-- Transparent Background for easy extraction -->
  <!-- <rect x="0" y="0" width="1200" height="400" fill="none" /> -->

  <!-- TOP BAR BUTTONS -->
  <g transform="translate(100, 80)" class="shadow">
    <!-- ? Button -->
    <g transform="translate(0, 0)">
      <circle cx="30" cy="30" r="30" class="btn-teal" />
      <circle cx="30" cy="30" r="22" class="icon-white" stroke-width="2.5" />
      <text x="30" y="32" class="text-white text-large">?</text>
    </g>

    <!-- i Button -->
    <g transform="translate(80, 0)">
      <circle cx="30" cy="30" r="30" class="btn-teal" />
      <circle cx="30" cy="30" r="22" class="icon-white" stroke-width="2.5" />
      <text x="30" y="32" class="text-white text-large" style="font-style: italic; font-family: serif;">i</text>
    </g>

    <!-- Contrast Toggle -->
    <g transform="translate(160, 0)">
      <circle cx="30" cy="30" r="30" class="btn-teal" />
      <circle cx="30" cy="30" r="22" class="icon-white" stroke-width="2.5" />
      <circle cx="30" cy="30" r="10" class="icon-white" stroke-width="2" />
      <path d="M30 20 A 10 10 0 0 0 30 40 Z" class="icon-fill-white" />
    </g>

    <!-- 1x Button -->
    <g transform="translate(240, 0)">
      <circle cx="30" cy="30" r="30" class="btn-teal" />
      <circle cx="30" cy="30" r="22" class="icon-white" stroke-width="2.5" />
      <text x="30" y="32" class="text-white" style="font-size: 16px;">1x</text>
    </g>

    <!-- ES Button -->
    <g transform="translate(320, 0)">
      <circle cx="30" cy="30" r="30" class="btn-teal" />
      <circle cx="30" cy="30" r="22" class="icon-white" stroke-width="2.5" />
      <text x="30" y="32" class="text-white" style="font-size: 16px;">ES</text>
    </g>
  </g>

  <!-- BOTTOM BAR BUTTONS -->
  <g transform="translate(100, 220)" class="shadow">
    
    <!-- Search / Zoom -->
    <g transform="translate(0, 10)">
      <circle cx="30" cy="30" r="30" class="btn-teal" />
      <circle cx="26" cy="26" r="10" class="icon-white" />
      <line x1="33" y1="33" x2="42" y2="42" class="icon-white" />
    </g>

    <!-- Left Arrow -->
    <g transform="translate(80, 10)">
      <circle cx="30" cy="30" r="30" class="btn-teal" />
      <polyline points="35,16 22,30 35,44" class="icon-white" stroke-width="5" />
    </g>

    <!-- Active Step 9 (Larger with faint outline) -->
    <g transform="translate(160, 0)">
      <circle cx="40" cy="40" r="48" class="btn-teal-faint" />
      <circle cx="40" cy="40" r="38" class="btn-teal" />
      <text x="40" y="44" class="text-white" style="font-size: 40px;">9</text>
    </g>

    <!-- Right Arrow -->
    <g transform="translate(260, 10)">
      <circle cx="30" cy="30" r="30" class="btn-teal" />
      <polyline points="25,16 38,30 25,44" class="icon-white" stroke-width="5" />
    </g>

    <!-- Replay / Reset -->
    <g transform="translate(340, 10)">
      <circle cx="30" cy="30" r="30" class="btn-teal" />
      <!-- Circular arrow -->
      <path d="M30 18 A 12 12 0 1 1 18 30" class="icon-white" />
      <!-- Arrow head -->
      <polyline points="13,18 18,18 18,23" class="icon-white" />
    </g>
  </g>

  <!-- 3D CUBE TARGET BUTTON (BOTTOM RIGHT) -->
  <g transform="translate(600, 220)" class="shadow">
    <circle cx="35" cy="35" r="35" class="btn-teal" />
    <!-- Corners (Target) -->
    <path d="M22 18 L18 18 L18 22" class="icon-white" />
    <path d="M48 18 L52 18 L52 22" class="icon-white" />
    <path d="M22 52 L18 52 L18 48" class="icon-white" />
    <path d="M48 52 L52 52 L52 48" class="icon-white" />
    
    <!-- 3D Cube -->
    <polyline points="35,22 45,28 45,40 35,46 25,40 25,28 35,22" class="icon-white" stroke-width="2.5" />
    <line x1="35" y1="34" x2="35" y2="46" class="icon-white" stroke-width="2.5" />
    <line x1="35" y1="34" x2="25" y2="28" class="icon-white" stroke-width="2.5" />
    <line x1="35" y1="34" x2="45" y2="28" class="icon-white" stroke-width="2.5" />
  </g>

  <!-- Labels to help identify -->
  <text x="310" y="50" fill="#666" font-family="sans-serif" font-size="14px">Botones Superiores (Top Bar)</text>
  <text x="310" y="190" fill="#666" font-family="sans-serif" font-size="14px">Botones Inferiores (Bottom Bar)</text>
  <text x="635" y="190" fill="#666" font-family="sans-serif" font-size="14px">Modo 3D / AR</text>
</svg>
