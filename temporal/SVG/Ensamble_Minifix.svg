<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   viewBox="0 0 400 210"
   width="100%"
   height="100%"
   version="1.1"
   id="svg_minifix"
   xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradiente metálico para el perno y cuerpo del minifix -->
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="30%" stop-color="#cbd5e1" />
      <stop offset="70%" stop-color="#94a3b8" />
      <stop offset="100%" stop-color="#64748b" />
    </linearGradient>

    <!-- Gradiente metálico con tintes cian para la leva -->
    <linearGradient id="tealMetalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="40%" stop-color="#cbd5e1" />
      <stop offset="80%" stop-color="#0891b2" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#94a3b8" />
    </linearGradient>

    <!-- Gradiente cian/teal de la marca para indicadores -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>

    <!-- Gradiente para la madera estilo Tech Ethos -->
    <linearGradient id="woodGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>
    
    <!-- Filtro de sombra suave para dar profundidad -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Capa 1: Paneles de Madera (Tech Ethos Light Style) -->
  <g id="wood_panels" filter="url(#softShadow)">
    <!-- Panel Izquierdo (donde va la caja de leva) -->
    <rect x="25" y="25" width="170" height="160" rx="12" fill="url(#woodGrad)" stroke="#e2e8f0" stroke-width="2" />
    <!-- Línea punteada decorativa interna -->
    <rect x="35" y="35" width="150" height="140" rx="8" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,4" />
    
    <!-- Panel Derecho (donde va el perno) -->
    <rect x="225" y="45" width="150" height="120" rx="12" fill="url(#woodGrad)" stroke="#e2e8f0" stroke-width="2" />
    <rect x="235" y="55" width="130" height="100" rx="8" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,4" />
    
    <!-- Línea de puente de conexión -->
    <line x1="195" y1="105" x2="225" y2="105" stroke="#0891b2" stroke-width="2" stroke-dasharray="4,4" />
  </g>

  <!-- Capa 2: Componentes de Herrería (Perno y Leva) -->
  <g id="hardware" filter="url(#softShadow)">
    <!-- Perno Minifix -->
    <g id="minifix_bolt">
      <!-- Rosca del perno (dentro de la madera derecha) -->
      <rect x="225" y="97" width="40" height="16" rx="2" fill="#64748b" stroke="#1e293b" stroke-width="2" />
      <line x1="233" y1="97" x2="233" y2="113" stroke="#1e293b" stroke-width="2" />
      <line x1="241" y1="97" x2="241" y2="113" stroke="#1e293b" stroke-width="2" />
      <line x1="249" y1="97" x2="249" y2="113" stroke="#1e293b" stroke-width="2" />
      <line x1="257" y1="97" x2="257" y2="113" stroke="#1e293b" stroke-width="2" />

      <!-- Cuello/Tope del perno -->
      <rect x="217" y="93" width="8" height="24" rx="2" fill="url(#metalGrad)" stroke="#1e293b" stroke-width="2" />

      <!-- Vástago (cuerpo del perno) -->
      <rect x="165" y="98" width="52" height="14" fill="url(#metalGrad)" stroke="#1e293b" stroke-width="2" />

      <!-- Cabeza del perno (dentro de la leva) -->
      <rect x="145" y="95" width="20" height="20" rx="3" fill="url(#metalGrad)" stroke="#1e293b" stroke-width="2" />
    </g>

    <!-- Caja de Leva Minifix -->
    <g id="minifix_cam">
      <!-- Orificio de la caja -->
      <circle cx="110" cy="105" r="42" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="2" />
      <!-- Cuerpo de la Leva -->
      <circle cx="110" cy="105" r="38" fill="url(#tealMetalGrad)" stroke="#1e293b" stroke-width="2.5" />
      
      <!-- Detalle de ranura de destornillador -->
      <circle cx="110" cy="105" r="14" fill="#1e293b" />
      <rect x="92" y="101" width="36" height="8" rx="2" fill="#1e293b" stroke="#1e293b" stroke-width="0.5" />
      <rect x="106" y="87" width="8" height="36" rx="2" fill="#1e293b" stroke="#1e293b" stroke-width="0.5" />
      <!-- Centro metálico para profundidad -->
      <circle cx="110" cy="105" r="6" fill="#cbd5e1" />
      <line x1="102" y1="105" x2="118" y2="105" stroke="#1e293b" stroke-width="1.5" />
      <line x1="110" y1="97" x2="110" y2="113" stroke="#1e293b" stroke-width="1.5" />

      <!-- Ranura de apriete (indicativo en la leva) -->
      <path d="M 85,73 A 28,28 0 0,0 85,137" fill="none" stroke="#1e293b" stroke-width="2.5" stroke-dasharray="3,3" />
    </g>
  </g>

  <!-- Capa 3: Indicadores Educativos y de Giro -->
  <g id="indicators">
    <!-- Flecha de giro de 180° en degradado Cian -->
    <path d="M 110,50 A 55,55 0 0,1 165,105 A 55,55 0 0,1 110,160" 
          fill="none" 
          stroke="url(#cyanGrad)" 
          stroke-width="5" 
          stroke-linecap="round" />
          
    <!-- Cabeza de la flecha de giro -->
    <path d="M 110,160 l 10,-8.5 v 17 z" fill="#0891b2" stroke="#0891b2" stroke-width="1" stroke-linejoin="round" />
    
    <!-- Punto de inicio del giro -->
    <circle cx="110" cy="50" r="4" fill="#06b6d4" />

    <!-- Etiqueta de texto de 180° -->
    <g transform="translate(180, 112)">
      <!-- Pastilla translúcida de fondo -->
      <rect x="-10" y="-22" width="65" height="32" rx="16" fill="#ffffff" fill-opacity="0.9" stroke="#cbd5e1" stroke-width="1.5" />
      <!-- Texto 180° -->
      <text x="22.5" y="1" 
            font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
            font-size="16" 
            font-weight="800" 
            fill="#0891b2" 
            text-anchor="middle">180°</text>
    </g>
  </g>
</svg>
