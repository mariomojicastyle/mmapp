<svg viewBox="0 0 900 650" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="650" fill="#0f172a" rx="15"/>
  
  <!-- Title -->
  <text x="450" y="40" font-family="Inter, sans-serif" font-size="26" font-weight="bold" fill="#f8fafc" text-anchor="middle">Arquitectura B2B &amp; Portfolio Personal - V2</text>
  <text x="450" y="65" font-family="Inter, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">(Automatización con Netlify + Next.js)</text>
  
  <!-- Git / GitHub Section (Source of Truth) -->
  <g transform="translate(350, 100)">
    <rect width="200" height="120" fill="#1e293b" stroke="#f43f5e" stroke-width="2" rx="10"/>
    <text x="100" y="30" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#f8fafc" text-anchor="middle">GitHub (Repos)</text>
    <rect x="20" y="45" width="160" height="60" fill="#0f172a" rx="5"/>
    <text x="100" y="70" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">b2b-hub (Main Repo)</text>
    <text x="100" y="90" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">mmapp (Netlify Sync)</text>
  </g>

  <!-- Frontend / Portfolio Section -->
  <g transform="translate(50, 280)">
    <rect width="250" height="200" fill="#1e293b" stroke="#06b6d4" stroke-width="2" rx="10"/>
    <text x="125" y="30" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#f8fafc" text-anchor="middle">Frontend (Netlify)</text>
    <rect x="15" y="50" width="220" height="130" fill="#0f172a" rx="5"/>
    <text x="125" y="75" font-family="Inter, sans-serif" font-size="13" font-weight="bold" fill="#f8fafc" text-anchor="middle">mariomojica.com</text>
    <text x="125" y="100" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Next.js + Netlify Plugin</text>
    <text x="125" y="125" font-family="Inter, sans-serif" font-size="12" fill="#22c55e" text-anchor="middle">Auto-build via netlify.toml</text>
    <text x="125" y="150" font-family="Inter, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">(Base: /mariomojica-portfolio)</text>
  </g>
  
  <!-- Backend / Database Section -->
  <g transform="translate(600, 280)">
    <rect width="250" height="200" fill="#1e293b" stroke="#22c55e" stroke-width="2" rx="10"/>
    <text x="125" y="30" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#f8fafc" text-anchor="middle">Supabase Cloud</text>
    <rect x="15" y="50" width="220" height="130" fill="#0f172a" rx="5"/>
    <text x="125" y="80" font-family="Inter, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">PostgreSQL (Managed)</text>
    <text x="125" y="105" font-family="Inter, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Auth &amp; Realtime API</text>
    <text x="125" y="130" font-family="Inter, sans-serif" font-size="12" fill="#22c55e" text-anchor="middle">Tier: Free (Optimizado)</text>
  </g>
  
  <!-- VPS / Automation Section -->
  <g transform="translate(325, 420)">
    <rect width="250" height="180" fill="#1e293b" stroke="#eab308" stroke-width="2" rx="10"/>
    <text x="12 head" y="30" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#f8fafc" text-anchor="middle" transform="translate(125,0)">Hetzner VPS (Ubuntu)</text>
    <rect x="20" y="50" width="210" height="110" fill="#0f172a" rx="5"/>
    <text x="125" y="80" font-family="Inter, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">n8n (Docker)</text>
    <text x="125" y="105" font-family="Inter, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Nginx Proxy Manager</text>
    <text x="125" y="135" font-family="Inter, sans-serif" font-size="11" fill="#c084fc" text-anchor="middle">Webhooks &amp; Automatización</text>
  </g>
  
  <!-- Connections -->
  <!-- GitHub to Netlify (Auto Trigger) -->
  <path d="M 350 160 Q 250 160 175 280" stroke="#f43f5e" stroke-width="2" fill="none" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
  <text x="180" y="200" font-family="Inter, sans-serif" font-size="10" fill="#f43f5e" text-anchor="middle">Push Event</text>

  <!-- Frontend to Supabase -->
  <path d="M 300 380 L 600 380" stroke="#06b6d4" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="450" y="370" font-family="Inter, sans-serif" font-size="12" fill="#06b6d4" text-anchor="middle">API / Client SDK</text>

  <!-- Supabase to VPS (Webhooks) -->
  <path d="M 725 480 Q 725 510 575 510" stroke="#22c55e" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="650" y="530" font-family="Inter, sans-serif" font-size="11" fill="#22c55e" text-anchor="middle">Webhooks (Realtime)</text>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f8fafc" />
    </marker>
  </defs>
</svg>
