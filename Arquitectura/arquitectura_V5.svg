<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo y Gradiente -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDFCF8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5F5F0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="200%" height="200%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#grad1)" rx="20"/>

  <!-- Título -->
  <text x="400" y="40" font-family="Arial" font-size="22" font-weight="900" text-anchor="middle" fill="#333" font-style="italic" text-transform="uppercase">ARQUITECTURA V5: AI-DRIVEN AUTOMATION</text>

  <!-- Capa Frontend -->
  <rect x="50" y="100" width="200" height="80" rx="15" fill="#0088AA" filter="url(#shadow)"/>
  <text x="150" y="145" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="white">FRONTEND: NEXT.JS</text>
  <text x="150" y="165" font-family="Arial" font-size="10" text-anchor="middle" fill="white">Bilingüe (Netlify)</text>

  <!-- Flecha de Webhook -->
  <path d="M 250 140 L 400 140" stroke="#0088AA" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="325" y="130" font-family="Arial" font-size="10" text-anchor="middle" fill="#0088AA">POST Webhook</text>

  <!-- Capa Lógica/VPS -->
  <rect x="400" y="80" width="350" height="150" rx="15" fill="#333" filter="url(#shadow)"/>
  <text x="575" y="110" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="white">VPS: HETZNER (DOCKER)</text>
  
  <rect x="420" y="130" width="140" height="40" rx="10" fill="#FF6D5A"/>
  <text x="490" y="155" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="white">n8n Engine</text>

  <rect x="580" y="130" width="140" height="40" rx="10" fill="#0088AA"/>
  <text x="650" y="155" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Baserow DB</text>

  <!-- Flecha de Notificaciones -->
  <path d="M 575 230 L 575 300" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="640" y="270" font-family="Arial" font-size="10" text-anchor="middle" fill="#333">WhatsApp / Email</text>

  <!-- NUEVA CAPA: AGENTE IA (Antigravity) -->
  <rect x="250" y="320" width="300" height="130" rx="20" fill="#FDFCF8" stroke="#0088AA" stroke-width="3" filter="url(#shadow)"/>
  <text x="400" y="355" font-family="Arial" font-size="18" font-weight="900" text-anchor="middle" fill="#0088AA">🤖 AGENTE IA (Antigravity)</text>
  
  <rect x="270" y="375" width="260" height="55" rx="10" fill="#E6F4F7"/>
  <text x="400" y="395" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle" fill="#0088AA">n8n-MCP + 7 n8n-Skills</text>
  <text x="400" y="415" font-family="Arial" font-size="10" text-anchor="middle" fill="#0088AA">Gestión Autónoma de Flujos B2B</text>

  <!-- Flecha de Control MCP -->
  <path d="M 400 320 L 400 230" stroke="#0088AA" stroke-width="3" stroke-dasharray="5,5" fill="none" marker-end="url(#arrowhead)"/>
  <text x="330" y="280" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#0088AA">CONTROL MCP</text>

  <!-- Definición de puntas de flecha -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0088AA" />
    </marker>
  </defs>
</svg>
