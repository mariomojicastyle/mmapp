<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#0C0E14" rx="12"/>
  
  <!-- TopNav -->
  <rect x="0" y="0" width="800" height="64" fill="#111319" stroke="#3E484D" stroke-width="1"/>
  <text x="400" y="40" font-family="Prompt, sans-serif" font-size="16" fill="#71D3F7" text-anchor="middle" font-weight="bold">TopNav</text>
  
  <!-- Sidebar -->
  <rect x="0" y="64" width="220" height="536" fill="#191B22" stroke="#3E484D" stroke-width="1"/>
  <text x="110" y="320" font-family="Prompt, sans-serif" font-size="16" fill="#71D3F7" text-anchor="middle" font-weight="bold" transform="rotate(-90 110 320)">Sidebar</text>
  
  <!-- Content Area Wrapper -->
  <rect x="220" y="64" width="580" height="536" fill="#111319"/>
  
  <!-- PageHeader -->
  <rect x="240" y="84" width="540" height="80" rx="12" fill="#1E1F26" stroke="#3E484D" stroke-dasharray="4 4"/>
  <text x="510" y="130" font-family="Prompt, sans-serif" font-size="16" fill="#71D3F7" text-anchor="middle" font-weight="bold">PageHeader</text>
  
  <!-- TabMenu -->
  <rect x="240" y="184" width="130" height="396" rx="12" fill="#1E1F26" stroke="#3E484D" stroke-dasharray="4 4"/>
  <text x="305" y="380" font-family="Prompt, sans-serif" font-size="14" fill="#71D3F7" text-anchor="middle" font-weight="bold">TabMenu</text>
  
  <!-- SubContent -->
  <rect x="385" y="184" width="395" height="396" rx="24" fill="#1E1F26" stroke="#71D3F7" stroke-width="2" stroke-dasharray="8 8"/>
  <text x="582.5" y="380" font-family="Prompt, sans-serif" font-size="18" fill="#71D3F7" text-anchor="middle" font-weight="bold">SubContent</text>
</svg>
