<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 780" width="100%" height="100%">
    <style>
        .background { fill: #0b0f19; }
        .box-core { fill: #111827; stroke: #00f2fe; stroke-width: 2.5; rx: 12; filter: drop-shadow(0px 0px 8px rgba(0, 242, 254, 0.2)); }
        .box-vps { fill: #111827; stroke: #8b5cf6; stroke-width: 2.5; rx: 12; filter: drop-shadow(0px 0px 8px rgba(139, 92, 246, 0.2)); }
        .box-frontend { fill: #111827; stroke: #14b8a6; stroke-width: 2.5; rx: 12; filter: drop-shadow(0px 0px 8px rgba(20, 184, 166, 0.2)); }
        .box-rhino { fill: #111827; stroke: #f59e0b; stroke-width: 2; rx: 12; }
        .inner-app { fill: #1f2937; stroke: #4b5563; stroke-width: 1; rx: 6; }
        
        .title { fill: #00f2fe; font-family: 'Segoe UI', Roboto, sans-serif; font-size: 26px; font-weight: 800; letter-spacing: 0.5px; }
        .subtitle { fill: #9ca3af; font-family: 'Segoe UI', Roboto, sans-serif; font-size: 14px; font-weight: 400; }
        .box-title-core { fill: #00f2fe; font-family: 'Segoe UI', Roboto, sans-serif; font-size: 17px; font-weight: 700; }
        .box-title-vps { fill: #a78bfa; font-family: 'Segoe UI', Roboto, sans-serif; font-size: 17px; font-weight: 700; }
        .box-title-frontend { fill: #2dd4bf; font-family: 'Segoe UI', Roboto, sans-serif; font-size: 17px; font-weight: 700; }
        .box-title-rhino { fill: #fbbf24; font-family: 'Segoe UI', Roboto, sans-serif; font-size: 16px; font-weight: 700; }
        .inner-title { fill: #ffffff; font-family: 'Segoe UI', Roboto, sans-serif; font-size: 13px; font-weight: 600; }
        .text { fill: #e5e7eb; font-family: 'Segoe UI', Roboto, sans-serif; font-size: 13px; }
        .text-dim { fill: #9ca3af; font-family: 'Segoe UI', Roboto, sans-serif; font-size: 11px; }
        .text-label { fill: #38bdf8; font-family: 'Segoe UI', Roboto, sans-serif; font-size: 11px; font-weight: 600; }
        
        .line-flow { stroke: #06b6d4; stroke-width: 2; stroke-dasharray: 6,4; fill: none; }
        .line-sec { stroke: #8b5cf6; stroke-width: 2; stroke-dasharray: 4,4; fill: none; }
        .line-static { stroke: #374151; stroke-width: 1.5; fill: none; }
        .arrow-flow { fill: #06b6d4; }
        .arrow-sec { fill: #8b5cf6; }
    </style>
    <defs>
        <marker id="arrowhead-flow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" class="arrow-flow" />
        </marker>
        <marker id="arrowhead-sec" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" class="arrow-sec" />
        </marker>
    </defs>
    
    <!-- Background -->
    <rect width="100%" height="100%" class="background" />
    
    <!-- Header Title -->
    <text x="550" y="45" text-anchor="middle" class="title">Ecosistema B2B Mario Mojica</text>
    <text x="550" y="70" text-anchor="middle" class="subtitle">Arquitectura Tecnológica V7 (Producción, Métricas, CRM y Blindaje IP Shield)</text>

    <!-- FRONTEND LAYER (TOP) -->
    
    <!-- 1. Next.js Plataforma B2B (Top-Left) -->
    <rect x="70" y="110" width="300" height="170" class="box-frontend" />
    <text x="90" y="140" class="box-title-frontend">Plataforma B2B / CMS (Next.js)</text>
    <text x="90" y="165" class="text">- API Route /api/metrics/collect (Rate Limiting)</text>
    <text x="90" y="185" class="text">- API Route /api/assets/sign (Firma IP Shield)</text>
    <text x="90" y="205" class="text">- Server Actions &amp; Auth Middleware</text>
    <text x="90" y="225" class="text">- Vista de Reportes de Fricción PDF (@media print)</text>
    <text x="90" y="250" class="text-dim">Hospedado en Netlify • Puerto Desarrollo: 3003</text>

    <!-- 2. Visor 3D / App Armado (Top-Right) -->
    <rect x="730" y="110" width="300" height="170" class="box-frontend" />
    <text x="750" y="140" class="box-title-frontend">Visor 3D / App Armado (Vite)</text>
    <text x="750" y="165" class="text">- React + Three.js (@react-three/fiber)</text>
    <text x="750" y="185" class="text">- Hook useTelemetry (Despacha POST a Next.js)</text>
    <text x="750" y="205" class="text">- Cache urlsFirmadasCache (IP Shield)</text>
    <text x="750" y="225" class="text">- Carga Fluida de Assets Firmados</text>
    <text x="750" y="250" class="text-dim">Netlify CDN • Puerto Desarrollo: 5173</text>


    <!-- CORE BACKEND (CENTER) -->
    
    <!-- 3. Supabase Cloud (Center-Left) -->
    <rect x="400" y="310" width="300" height="170" class="box-core" />
    <text x="420" y="340" class="box-title-core">Supabase Cloud Backend</text>
    <text x="420" y="370" class="text">🗄️ PostgreSQL (proyectos, config, telemetría)</text>
    <text x="420" y="395" class="text">🔒 Storage Bucket: insumos_manuales (PRIVADO)</text>
    <text x="440" y="415" class="text-dim">- Contiene archivos .glb, audios y texturas</text>
    <text x="420" y="440" class="text">🔑 Auth Service (Gestión de Sesiones &amp; JWT)</text>


    <!-- INFRASTRUCTURE LAYER (BOTTOM) -->
    
    <!-- 4. VPS Hetzner (Bottom-Center) -->
    <rect x="370" y="520" width="460" height="220" class="box-vps" />
    <text x="390" y="550" class="box-title-vps">VPS Hetzner (Dockerized Stack)</text>
    
    <!-- Nginx Proxy Manager -->
    <rect x="390" y="575" width="200" height="50" class="inner-app" />
    <text x="400" y="595" class="inner-title">Nginx Proxy Manager</text>
    <text x="400" y="615" class="text-dim">SSL Let's Encrypt / Proxy Host</text>
    
    <!-- Umami Analytics -->
    <rect x="610" y="575" width="200" height="50" class="inner-app" />
    <text x="620" y="595" class="inner-title">Umami Analytics</text>
    <text x="620" y="615" class="text-dim">analytics.mariomojica.com</text>
    
    <!-- n8n Automation -->
    <rect x="390" y="645" width="200" height="50" class="inner-app" />
    <text x="400" y="665" class="inner-title">n8n Automation Engine</text>
    <text x="400" y="685" class="text-dim">Webhook Leads &amp; CRM Notifications</text>
    
    <!-- Baserow B2B CRM -->
    <rect x="610" y="645" width="200" height="50" class="inner-app" />
    <text x="620" y="665" class="inner-title">Baserow B2B CRM</text>
    <text x="620" y="685" class="text-dim">Leads (600) + Estado CRM select</text>

    <text x="390" y="725" class="text-dim">Ubuntu VPS • Docker Bridge internal_network • Disk Cleaned (56% Use)</text>

    <!-- 5. Rhino Compute (Bottom-Left) -->
    <rect x="70" y="520" width="260" height="120" class="box-rhino" />
    <text x="90" y="550" class="box-title-rhino">Rhino Compute Standalone</text>
    <text x="90" y="580" class="text">- Servidor Host Local (Windows 11)</text>
    <text x="90" y="600" class="text">- Puerto 8081 / Grasshopper API</text>
    <text x="90" y="620" class="text-dim">Renderizado Paramétrico de GLB</text>

    <!-- 6. Landing Page / Portafolio (Bottom-Right) -->
    <rect x="870" y="520" width="160" height="120" class="box-frontend" />
    <text x="885" y="550" class="box-title-frontend">Landing Page</text>
    <text x="885" y="580" class="text">- Next.js (Netlify)</text>
    <text x="885" y="600" class="text">- Captura de Leads</text>
    <text x="885" y="625" class="text-dim">mariomojica.com</text>


    <!-- CONNECTIONS & DATAFLOWS -->
    
    <!-- Visor 3D to Next.js API (Telemetry & Signature Requests) -->
    <path d="M 730,195 L 370,195" class="line-flow" marker-end="url(#arrowhead-flow)" />
    <text x="550" y="185" text-anchor="middle" class="text-label">POST /api/metrics/collect &amp; GET /api/assets/sign</text>
    
    <!-- Next.js API to Supabase (Secure Data Access) -->
    <path d="M 220,280 L 220,380 L 400,380" class="line-flow" marker-end="url(#arrowhead-flow)" />
    <text x="230" y="325" class="text-label">Firma de Storage &amp; Guardado de Telemetría</text>
    
    <!-- Next.js to Rhino Compute -->
    <path d="M 120,280 L 120,520" class="line-static" marker-end="url(#arrowhead-flow)" />
    <text x="125" y="450" class="text-dim">Query Geometrías (8081)</text>

    <!-- Landing Page to n8n Webhook -->
    <path d="M 950,520 L 950,470 L 610,470 Q 580,470 580,520 L 580,645" class="line-sec" marker-end="url(#arrowhead-sec)" />
    <text x="800" y="460" class="text-label" fill="#8b5cf6">Webhook Captura Lead</text>

    <!-- n8n to Baserow B2B CRM -->
    <path d="M 590,670 L 610,670" class="line-sec" marker-end="url(#arrowhead-sec)" />

    <!-- Nginx Proxy Manager to Umami -->
    <path d="M 590,600 L 610,600" class="line-static" marker-end="url(#arrowhead-flow)" />

    <!-- Landing & Platform to Umami (Visits Tracking) -->
    <!-- From Landing -->
    <path d="M 950,640 L 950,710 L 710,710 L 710,625" class="line-sec" marker-end="url(#arrowhead-sec)" />
    <!-- From Platform -->
    <path d="M 70,195 L 40,195 L 40,40 L 1060,40 L 1060,670 L 810,670 L 810,625" class="line-sec" stroke-dasharray="2,2" />
    <text x="965" y="700" class="text-label" fill="#8b5cf6">script.js (analytics)</text>

</svg>
