<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#0f172a" rx="15"/>
  
  <!-- Title -->
  <text x="400" y="40" font-family="Inter, sans-serif" font-size="24" font-weight="bold" fill="#f8fafc" text-anchor="middle">Arquitectura B2B Robusta - V1</text>
  
  <!-- User / Frontend Section -->
  <g transform="translate(50, 100)">
    <rect width="200" height="150" fill="#1e293b" stroke="#6366f1" stroke-width="2" rx="10"/>
    <text x="100" y="30" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#f8fafc" text-anchor="middle">Frontend (Netlify/Vercel)</text>
    <rect x="20" y="50" width="160" height="80" fill="#0f172a" rx="5"/>
    <text x="100" y="80" font-family="Inter, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">React + Vite</text>
    <text x="100" y="105" font-family="Inter, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Desacoplado del VPS</text>
  </g>
  
  <!-- Backend / Database Section -->
  <g transform="translate(550, 100)">
    <rect width="200" height="150" fill="#1e293b" stroke="#22c55e" stroke-width="2" rx="10"/>
    <text x="100" y="30" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#f8fafc" text-anchor="middle">Supabase Cloud</text>
    <rect x="20" y="50" width="160" height="80" fill="#0f172a" rx="5"/>
    <text x="100" y="80" font-family="Inter, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">PostgreSQL (Managed)</text>
    <text x="100" y="105" font-family="Inter, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Auth &amp; API</text>
  </g>
  
  <!-- VPS / Automation Section -->
  <g transform="translate(300, 350)">
    <rect width="200" height="180" fill="#1e293b" stroke="#eab308" stroke-width="2" rx="10"/>
    <text x="100" y="30" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#f8fafc" text-anchor="middle">Hetzner VPS (4GB)</text>
    <rect x="20" y="50" width="160" height="110" fill="#0f172a" rx="5"/>
    <text x="100" y="80" font-family="Inter, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">n8n (Orquestación)</text>
    <text x="100" y="105" font-family="Inter, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Nginx Proxy Manager</text>
    <text x="100" y="130" font-family="Inter, sans-serif" font-size="12" fill="#22c55e" text-anchor="middle">Uso de RAM < 1GB</text>
  </g>
  
  <!-- Connections -->
  <path d="M 250 175 L 550 175" stroke="#6366f1" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 650 250 L 500 400" stroke="#22c55e" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f8fafc" />
    </marker>
  </defs>
</svg>
