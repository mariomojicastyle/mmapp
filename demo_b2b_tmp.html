<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo B2B - Solicitud de Lead</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --text: #1e293b;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--primary);
        }

        .field {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        #status {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>🚀 Simulación B2B Lead</h1>
        <p>Al enviar este formulario, los datos viajarán a tu <b>n8n</b> y se guardarán en <b>Baserow</b>.</p>
        <div class="field">
            <label>Empresa Cliente</label>
            <input type="text" id="company" placeholder="Ej: Acme Corp">
        </div>
        <div class="field">
            <label>Correo de Contacto</label>
            <input type="email" id="email" placeholder="cliente@empresa.com">
        </div>
        <button onclick="sendData()">Enviar al CRM</button>
        <div id="status"></div>
    </div>

    <script>
        async function sendData() {
            const status = document.getElementById('status');
            const data = {
                company: document.getElementById('company').value,
                email: document.getElementById('email').value,
                timestamp: new Date().toISOString()
            };

            status.innerText = 'Enviando a n8n...';

            try {
                // NOTA: Esta URL ya está activa para producción
                const WEBHOOK_URL = 'http://46.62.208.181:5678/webhook/b2b-demo';

                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    status.innerHTML = '✅ <b>¡Éxito!</b> Revisa tu Baserow ahora.';
                    status.style.color = 'green';
                } else {
                    status.innerText = '❌ Error: Revisa que el webhook esté activo.';
                    status.style.color = 'red';
                }
            } catch (err) {
                status.innerText = '❌ Error de conexión con el servidor.';
                status.style.color = 'red';
            }
        }
    </script>
</body>

</html>
