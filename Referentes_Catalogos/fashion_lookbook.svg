<svg width="842" height="595" viewBox="0 0 842 595" xmlns="http://www.w3.org/2000/svg">
  <!-- Fashion Lookbook Layout -->
  <!-- Designed by Antigravity - Editable Template -->
  
  <rect width="842" height="595" fill="#1a1a1a" />
  
  <g id="lookbook_content">
    <text x="40" y="60" font-family="serif" font-size="48" font-weight="bold" fill="#ffffff">FASHION LOOK</text>
    <text x="40" y="90" font-family="Arial, sans-serif" font-size="14" fill="#e31e24">COLLECTION 2026</text>
    
    <!-- Hero Image Area -->
    <rect x="40" y="120" width="380" height="435" fill="#2c2c2c" />
    <text x="230" y="340" font-family="Arial, sans-serif" font-size="18" fill="#ffffff" text-anchor="middle">FULL-PAGE EDITORIAL IMAGE</text>
    <rect x="40" y="520" width="120" height="35" fill="#e31e24" />
    
    <!-- Secondary Grid -->
    <g id="secondary_images" transform="translate(460, 120)">
      <rect x="0" y="0" width="160" height="160" fill="#ffffff" opacity="0.1" />
      <rect x="180" y="0" width="160" height="160" fill="#ffffff" opacity="0.1" />
      
      <rect x="0" y="180" width="340" height="255" fill="#e31e24" opacity="0.05" />
      <text x="170" y="310" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">STORYTELLING SPACE</text>
      
      <!-- Numbering -->
      <text x="340" y="435" font-family="serif" font-size="64" font-weight="bold" fill="#ffffff" text-anchor="end" opacity="0.5">04</text>
    </g>
  </g>
</svg>
